<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="app-build" content="20260721-head-attachment" />
  <title>Legs and Feet Mesh Live Preview</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #171511;
      --muted: #70695f;
      --line: rgba(23, 21, 17, 0.14);
      --gold: #b48b45;
      --panel: rgba(255,255,255,.46);
      --button: rgba(255,255,255,.76);
      --button-active: #171511;
      --button-active-ink: #fffaf0;
    }

    :root[data-theme="dark"] {
      --bg: #1b1c1e;
      --ink: #e2e5e6;
      --muted: #aeb3b5;
      --line: rgba(226, 229, 230, 0.18);
      --panel: rgba(31,33,35,.82);
      --button: rgba(226,229,230,.10);
      --button-active: #d7dbdd;
      --button-active-ink: #191a1c;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at 50% 12%, #fffaf0 0%, var(--bg) 42%, #e8dfcf 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(23,21,17,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23,21,17,.026) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    :root[data-theme="dark"] body {
      background: radial-gradient(circle at 50% 12%, #303236 0%, var(--bg) 46%, #101113 100%);
    }

    :root[data-theme="dark"] body::before {
      background-image:
        linear-gradient(rgba(226,229,230,.042) 1px, transparent 1px),
        linear-gradient(90deg, rgba(226,229,230,.032) 1px, transparent 1px);
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 0;
      padding: 18px clamp(12px, 3vw, 42px);
    }

    .copy { display: none; }

    .stage {
      position: relative;
      height: min(96vh, 920px);
      display: grid;
      place-items: center;
      padding-top: 0;
      overflow: visible;
    }

    canvas {
      width: min(92vw, 820px);
      height: min(96vh, 920px);
      max-width: 100%;
      max-height: 92vh;
      cursor: grab;
      touch-action: none;
      filter: drop-shadow(0 38px 74px rgba(63, 47, 24, .18));
    }

    #faceTrackingVideo {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    :root[data-theme="dark"] canvas {
      filter: drop-shadow(0 38px 74px rgba(0, 0, 0, .34));
    }

    .theme-switcher {
      position: absolute;
      right: 20px;
      top: 20px;
      z-index: 7;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(63, 47, 24, .10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .theme-mode-btn {
      min-width: 62px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .theme-mode-btn.active {
      background: var(--button-active);
      color: var(--button-active-ink);
    }

    .camera-readout {
      position: absolute;
      right: 20px;
      top: 20px;
      z-index: 6;
      display: none;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #171511;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.52);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(63, 47, 24, .10);
      white-space: pre-line;
      line-height: 1.45;
    }

    .hint {
      position: absolute;
      right: 20px;
      bottom: 20px;
      display: none;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      color: var(--muted);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.34);
      backdrop-filter: blur(10px);
    }

    .view-console {
      position: absolute;
      right: 20px;
      bottom: 316px;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(2, minmax(64px, 1fr));
      gap: 7px;
      width: 154px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(63, 47, 24, .10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .view-title {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .view-btn {
      height: 30px;
      border: 1px solid rgba(23,21,17,.22);
      border-radius: 8px;
      background: var(--button);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .view-btn.active {
      background: var(--button-active);
      color: var(--button-active-ink);
    }

    .direction-console {
      position: absolute;
      right: 20px;
      bottom: 72px;
      z-index: 6;
      display: none;
      grid-template-columns: repeat(3, 38px);
      gap: 7px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(63, 47, 24, .10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .direction-title,
    .direction-readout,
    .direction-turns {
      grid-column: 1 / -1;
    }

    .direction-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .direction-readout {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
      min-height: 31px;
      white-space: pre-line;
    }

    .dir-btn {
      width: 38px;
      height: 34px;
      border: 1px solid rgba(23,21,17,.22);
      border-radius: 8px;
      background: var(--button);
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .dir-btn.active {
      background: var(--button-active);
      color: var(--button-active-ink);
    }

    .dir-forward,
    .dir-back {
      grid-column: 2;
    }

    .dir-left {
      grid-column: 1;
    }

    .direction-turns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .turn-btn {
      width: 100%;
      height: 30px;
      border: 1px solid rgba(23,21,17,.22);
      border-radius: 8px;
      background: var(--button);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .control-panel {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(2, minmax(86px, 1fr));
      gap: 8px;
      align-items: center;
      max-height: calc(100vh - 36px);
      overflow-y: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(63, 47, 24, .10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .panel-title {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .mesh-color-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .mesh-color-menu-toggle {
      height: 26px;
      padding: 0 10px;
      border: 1px solid rgba(23,21,17,.20);
      border-radius: 999px;
      background: var(--button);
      color: var(--ink);
      cursor: pointer;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .mesh-color-menu-toggle:active { transform: scale(.97); }

    .mesh-color-list {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(86px, 1fr));
      gap: 8px;
    }

    .mesh-color-list[hidden] { display: none; }

    .toggle {
      width: 100%; min-width: 86px;
      height: 30px;
      border: 1px solid rgba(23,21,17,.22);
      border-radius: 999px;
      background: var(--button-active);
      color: var(--button-active-ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .toggle.active#toggleAllColors { background: #111511; color: white; }
    .toggle.active#toggleHead { background: #111111; color: white; }
    .toggle.active#toggleNeck { background: #565656; color: white; }
    .toggle.active#toggleTorso { background: #ff7a00; color: white; }
    .toggle.active#toggleWaist { background: #c96a2b; color: white; }
    .toggle.active#togglePelvis { background: #8a4f2a; color: white; }
    .toggle.active#toggleHip { background: #a0522d; color: white; }
    .toggle.active#toggleShoulder { background: #00a884; color: white; }
    .toggle.active#toggleArm { background: #00bcd4; color: #171511; }
    .toggle.active#toggleElbow { background: #00838f; color: white; }
    .toggle.active#toggleWrist { background: #4dd0e1; color: #171511; }
    .toggle.active#togglePalm { background: #26a69a; color: white; }
    .toggle.active#toggleFinger { background: #66bb6a; color: #171511; }
    .toggle.active#toggleThigh { background: #7b2cff; color: white; }
    .toggle.active#toggleCalf { background: #1f6fff; color: white; }
    .toggle.active#toggleKnee { background: #ff2f92; color: white; }
    .toggle.active#toggleAnkle { background: #d31616; color: white; }
    .toggle.active#toggleHeel { background: #6d4c41; color: white; }
    .toggle.active#toggleFoot { background: #e7b900; color: #171511; }
    .toggle.active#toggleToe { background: #f4a261; color: #171511; }
    .toggle.active#toggleToeNails { background: #6f1028; color: white; }
    .toggle.active#toggleBoot { background: #14100c; color: white; }
    .toggle.active#toggleBone { background: #8b6a2f; color: white; }

    .zoom-title { margin-top: 6px; }

    .zoom-btn { background: var(--button); color: var(--ink); }
    .zoom-btn:active { transform: scale(.97); }
    #runToggle.active,
    #autoMovesToggle.active,
    #spinToggle.active,
    #crouchToggle.active,
    #squatToggle.active,
    #moonwalkToggle.active { background: var(--button-active); color: var(--button-active-ink); }

    #faceTrackingToggle.active { background: #087f70; color: #ffffff; }

    #faceTrackingToggle.camera-mode-btn {
      grid-column: 1 / -1;
      width: 100%;
      border: 1px solid rgba(23,21,17,.18);
      background: var(--button);
      color: var(--ink);
    }

    #faceTrackingToggle.camera-mode-btn:active { transform: scale(.98); }
    #faceTrackingToggle.camera-mode-btn:disabled { opacity: .68; cursor: wait; }

    #faceTrackingToggle.camera-mode-btn.active {
      background: #087f70;
      color: #ffffff;
    }

    #faceTrackingToggle[data-state="error"] {
      border-color: rgba(170, 45, 45, .45);
      color: #a52f2f;
    }

    .learning-panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 7;
      width: min(270px, calc(100vw - 40px));
      max-height: 280px;
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(63, 47, 24, .10);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .learning-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .learning-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .learning-toggle,
    .learning-stop,
    .session-action {
      border: 1px solid rgba(23,21,17,.22);
      background: var(--button);
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
    }

    .learning-toggle,
    .learning-stop {
      min-height: 30px;
      border-radius: 8px;
      font-size: 11px;
    }

    .learning-toggle.active {
      background: #a52f2f;
      color: #ffffff;
    }

    .learning-stop.active {
      background: var(--button-active);
      color: var(--button-active-ink);
    }

    .learning-stop:disabled,
    .session-action:disabled { opacity: .45; cursor: default; }

    .learning-status {
      min-height: 16px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .learning-sessions-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .learning-session-list {
      display: grid;
      gap: 6px;
      max-height: 126px;
      overflow-y: auto;
    }

    .learning-empty {
      color: var(--muted);
      font-size: 11px;
      padding: 4px 0;
    }

    .learning-session {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 5px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: color-mix(in srgb, var(--button) 72%, transparent);
    }

    .session-meta { min-width: 0; }
    .session-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 800;
    }
    .session-detail { color: var(--muted); font-size: 9px; margin-top: 2px; }
    .session-action { height: 26px; padding: 0 7px; border-radius: 7px; font-size: 9px; }

    :root[data-theme="dark"] .theme-switcher,
    :root[data-theme="dark"] .view-console,
    :root[data-theme="dark"] .direction-console,
    :root[data-theme="dark"] .control-panel,
    :root[data-theme="dark"] .learning-panel {
      box-shadow: 0 12px 30px rgba(0,0,0,.30);
    }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .page { min-height: 100vh; height: auto; grid-template-columns: 1fr; }
      canvas { width: min(94vw, 680px); height: min(112vw, 860px); }
      .theme-switcher { right: 0; top: 10px; }
      .theme-mode-btn { min-width: 52px; }
      .view-console { right: 10px; bottom: 304px; }
      .direction-console { right: 10px; bottom: 64px; }
      .learning-panel { right: 10px; bottom: 10px; width: min(240px, calc(100vw - 20px)); }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="stage" aria-label="interactive human mesh feet preview">
      <canvas id="figure"></canvas>
      <video id="faceTrackingVideo" autoplay playsinline muted aria-hidden="true"></video>
      <div class="theme-switcher" role="group" aria-label="display and camera controls">
        <button class="theme-mode-btn active" id="themeBright" type="button" aria-pressed="true">Bright</button>
        <button class="theme-mode-btn" id="themeDark" type="button" aria-pressed="false">Dark</button>
        <button class="theme-mode-btn camera-mode-btn" id="faceTrackingToggle" type="button" aria-pressed="false">Track Camera</button>
      </div>
      <div class="control-panel" aria-label="mesh color controls">
        <div class="panel-title mesh-color-header">
          <span>Mesh Color</span>
          <button class="mesh-color-menu-toggle" id="meshColorMenuToggle" type="button" aria-expanded="false" aria-controls="meshColorList">Expand</button>
        </div>
        <div class="mesh-color-list" id="meshColorList" hidden>
          <button class="toggle" id="toggleAllColors" type="button">All Off</button>
          <button class="toggle" id="toggleHead" type="button">Head</button>
          <button class="toggle" id="toggleNeck" type="button">Neck</button>
          <button class="toggle" id="toggleTorso" type="button">Torso</button>
          <button class="toggle" id="toggleWaist" type="button">Waist</button>
          <button class="toggle" id="togglePelvis" type="button">Pelvis</button>
          <button class="toggle" id="toggleHip" type="button">Hip</button>
          <button class="toggle" id="toggleShoulder" type="button">Shoulder</button>
          <button class="toggle" id="toggleArm" type="button">Arm</button>
          <button class="toggle" id="toggleElbow" type="button">Elbow</button>
          <button class="toggle" id="toggleWrist" type="button">Wrist</button>
          <button class="toggle" id="togglePalm" type="button">Palm</button>
          <button class="toggle" id="toggleFinger" type="button">Finger</button>
          <button class="toggle" id="toggleThigh" type="button">Thigh</button>
          <button class="toggle" id="toggleCalf" type="button">Calf</button>
          <button class="toggle" id="toggleKnee" type="button">Knee</button>
          <button class="toggle" id="toggleAnkle" type="button">Ankle</button>
          <button class="toggle" id="toggleHeel" type="button">Heel</button>
          <button class="toggle" id="toggleFoot" type="button">Foot</button>
          <button class="toggle" id="toggleToe" type="button">Toe</button>
          <button class="toggle" id="toggleToeNails" type="button">Toenails</button>
          <button class="toggle" id="toggleBoot" type="button">Boot</button>
          <button class="toggle" id="toggleBone" type="button">Bone</button>
        </div>
        <div class="panel-title zoom-title">Zoom</div>
        <button class="toggle zoom-btn" id="zoomIn" type="button">Zoom In</button>
        <button class="toggle zoom-btn" id="zoomOut" type="button">Zoom Out</button>
        <button class="toggle zoom-btn" id="zoomReset" type="button">Reset</button>
        <div class="panel-title zoom-title">Motion</div>
        <button class="toggle zoom-btn" id="runToggle" type="button">Run Motion</button>
        <button class="toggle zoom-btn" id="jumpAction" type="button">Jump</button>
        <button class="toggle zoom-btn" id="moonwalkToggle" type="button">Moonwalk</button>
        <button class="toggle zoom-btn" id="spinToggle" type="button">Spin</button>
        <button class="toggle zoom-btn" id="crouchToggle" type="button">Crouch</button>
        <button class="toggle zoom-btn" id="squatToggle" type="button">Squat</button>
        <button class="toggle zoom-btn" id="autoMovesToggle" type="button">Auto Moves</button>
      </div>
      <div class="camera-readout" id="cameraReadout">Camera X: 0.58 | Y: -0.47 | Zoom: 1.00</div>
      <div class="view-console" aria-label="camera view controls">
        <div class="view-title">Camera View</div>
        <button class="view-btn active" id="viewInitial" type="button">Initial</button>
        <button class="view-btn" id="viewFront" type="button">Front</button>
        <button class="view-btn" id="viewSide" type="button">Side</button>
        <button class="view-btn" id="viewTop" type="button">Top</button>
      </div>
      <div class="direction-console" aria-label="walk direction controls">
        <div class="direction-title">Walk Direction</div>
        <div class="direction-readout" id="walkDirectionReadout">Forward 0 deg</div>
        <button class="dir-btn dir-forward active" id="walkDirForward" type="button" aria-label="walk forward">W</button>
        <button class="dir-btn dir-left" id="walkDirLeft" type="button" aria-label="walk left">A</button>
        <button class="dir-btn dir-reset" id="walkDirReset" type="button" aria-label="reset direction">0</button>
        <button class="dir-btn dir-right" id="walkDirRight" type="button" aria-label="walk right">D</button>
        <button class="dir-btn dir-back" id="walkDirBack" type="button" aria-label="walk backward">S</button>
        <div class="direction-turns">
          <button class="turn-btn" id="walkTurnLeft" type="button">-15</button>
          <button class="turn-btn" id="walkTurnRight" type="button">+15</button>
        </div>
      </div>
      <section class="learning-panel" aria-label="learning mode sessions">
        <div class="learning-header">
          <div class="learning-title">Learning Mode</div>
          <button class="learning-toggle" id="learningModeToggle" type="button" aria-pressed="false">Start</button>
        </div>
        <button class="learning-stop" id="learningPlaybackStop" type="button" aria-pressed="false" disabled>Stop Playing</button>
        <div class="learning-status" id="learningModeStatus" aria-live="polite">Ready to record face and upper-body gestures.</div>
        <div class="learning-sessions-label">Saved JSON Sessions</div>
        <div class="learning-session-list" id="learningSessionList">
          <div class="learning-empty">No saved sessions yet.</div>
        </div>
      </section>
      <div class="hint">Drag figure to inspect; drag boots on/off</div>
    </section>
  </main>

  <script src="./lee_perry_smith_rear_mesh.js"></script>
  <script>
    const canvas = document.getElementById('figure');
    const ctx = canvas.getContext('2d', { alpha: true });
    const APP_BUILD_ID = '20260721-head-attachment';
    const cameraReadout = document.getElementById('cameraReadout');
    const faceTrackingVideo = document.getElementById('faceTrackingVideo');
    const faceTrackingToggle = document.getElementById('faceTrackingToggle');
    const learningModeToggle = document.getElementById('learningModeToggle');
    const learningPlaybackStop = document.getElementById('learningPlaybackStop');
    const learningModeStatus = document.getElementById('learningModeStatus');
    const learningSessionList = document.getElementById('learningSessionList');

    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let width = 0, height = 0, scale = 1;
    let points = [], links = [], faces = [], faceSocketLoops = [], faceMouthPaths = [], tick = 0;
    let displayTheme = 'bright';
    const DARK_FIGURE_INK = '#6F86A6';
    const DARK_FIGURE_HIGHLIGHT = '#8299B8';

    function loadFaceTrackingScript(url) {
      if (faceTrackingScripts.has(url)) return faceTrackingScripts.get(url);
      const promise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.async = true;
        script.onload = () => resolve(true);
        script.onerror = () => reject(new Error(`Unable to load ${url}`));
        document.head.appendChild(script);
      }).catch(error => {
        faceTrackingScripts.delete(url);
        throw error;
      });
      faceTrackingScripts.set(url, promise);
      return promise;
    }

    function updateTrackedFaceRoll(landmarks) {
      const eyeA = landmarks?.[33];
      const eyeB = landmarks?.[263];
      if (!eyeA || !eyeB) {
        faceTracking.inputRoll = 0;
        faceTracking.targetHeadRoll = 0;
        return;
      }
      const left = eyeA.x <= eyeB.x ? eyeA : eyeB;
      const right = eyeA.x <= eyeB.x ? eyeB : eyeA;
      const roll = Math.atan2(right.y - left.y, right.x - left.x);
      faceTracking.inputRoll = Math.atan2(Math.sin(roll), Math.cos(roll));
      // Canvas Y grows downward, so a positive image-space roll is clockwise on the figure too.
      faceTracking.targetHeadRoll = faceClamp(faceTracking.inputRoll, -.72, .72);
    }

    function handleFaceTrackingResults(results) {
      if (!faceTracking.enabled) return;
      const raw = results?.multiFaceLandmarks?.[0];
      if (!raw?.length) {
        if (performance.now() - faceTracking.lastSeenAt > 280) {
          const nextStatus = faceTracking.hasFace ? 'holding' : 'searching';
          const changed = faceTracking.status !== nextStatus;
          faceTracking.status = nextStatus;
          if (changed) syncFaceTrackingButton();
        }
        return;
      }

      const previous = faceTracking.landmarks;
      const blend = .42;
      faceTracking.landmarks = raw.map((point, index) => {
        const old = previous[index];
        if (!old) return { x: point.x, y: point.y, z: point.z || 0 };
        return {
          x: old.x + (point.x - old.x) * blend,
          y: old.y + (point.y - old.y) * blend,
          z: old.z + ((point.z || 0) - old.z) * blend
        };
      });
      const changed = !faceTracking.hasFace || faceTracking.status !== 'tracking';
      faceTracking.hasFace = true;
      faceTracking.status = 'tracking';
      faceTracking.lastSeenAt = performance.now();
      updateTrackedFaceRoll(faceTracking.landmarks);
      if (changed) syncFaceTrackingButton();
    }

    function landmarkIsVisible(point, threshold = .42) {
      return Boolean(point) && (point.visibility == null || point.visibility >= threshold) &&
        (point.presence == null || point.presence >= threshold);
    }

    function normalizedBoneDirection(from, to) {
      const vector = { x: -(to.x - from.x), y: to.y - from.y, z: -(to.z - from.z) * .72 };
      const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
      return { x: vector.x / length, y: vector.y / length, z: vector.z / length };
    }

    function mappedArmTarget(side, landmarks) {
      const indices = side === 'left' ? [11, 13, 15] : [12, 14, 16];
      const [shoulder, elbow, wrist] = indices.map(index => landmarks[index]);
      if (![shoulder, elbow, wrist].every(point => landmarkIsVisible(point))) return null;
      const anchor = { x: side === 'left' ? -.58 : .58, y: -1.05, z: side === 'left' ? .055 : -.055 };
      const upperDirection = normalizedBoneDirection(shoulder, elbow);
      const lowerDirection = normalizedBoneDirection(elbow, wrist);
      const mappedElbow = {
        x: anchor.x + upperDirection.x * .70,
        y: anchor.y + upperDirection.y * .70,
        z: anchor.z + upperDirection.z * .70
      };
      const mappedWrist = {
        x: mappedElbow.x + lowerDirection.x * .76,
        y: mappedElbow.y + lowerDirection.y * .76,
        z: mappedElbow.z + lowerDirection.z * .76
      };
      return {
        upperA: blendPoint(anchor, mappedElbow, .055),
        elbow: mappedElbow,
        forearmA: blendPoint(mappedElbow, mappedWrist, .070),
        wrist: mappedWrist
      };
    }

    function smoothArmTarget(previous, next, amount = .34) {
      if (!previous) return next;
      return {
        upperA: blendPoint(previous.upperA, next.upperA, amount),
        elbow: blendPoint(previous.elbow, next.elbow, amount),
        forearmA: blendPoint(previous.forearmA, next.forearmA, amount),
        wrist: blendPoint(previous.wrist, next.wrist, amount)
      };
    }

    function handlePoseTrackingResults(results) {
      if (!faceTracking.enabled) return;
      const landmarks = results?.poseLandmarks;
      if (!landmarks?.length) {
        if (performance.now() - upperBodyTracking.lastPoseSeenAt > 360 && upperBodyTracking.hasPose) {
          upperBodyTracking.hasPose = false;
          upperBodyTracking.poseLandmarks = [];
          upperBodyTracking.armTargets.left = null;
          upperBodyTracking.armTargets.right = null;
          upperBodyTracking.dirty = true;
          syncFaceTrackingButton();
        }
        return;
      }
      const nextTargets = {
        left: mappedArmTarget('left', landmarks),
        right: mappedArmTarget('right', landmarks)
      };
      const now = performance.now();
      upperBodyTracking.poseLandmarks = landmarks.map(point => ({ ...point }));
      for (const side of ['left', 'right']) {
        const next = nextTargets[side];
        if (next) {
          upperBodyTracking.armTargets[side] = smoothArmTarget(upperBodyTracking.armTargets[side], next);
          upperBodyTracking.armLastSeen[side] = now;
          upperBodyTracking.dirty = true;
        } else if (upperBodyTracking.armTargets[side] && now - upperBodyTracking.armLastSeen[side] > 360) {
          upperBodyTracking.armTargets[side] = null;
          upperBodyTracking.dirty = true;
        }
      }
      upperBodyTracking.hasPose = Boolean(upperBodyTracking.armTargets.left || upperBodyTracking.armTargets.right);
      if (upperBodyTracking.hasPose) upperBodyTracking.lastPoseSeenAt = now;
      syncFaceTrackingButton();
    }

    function landmarkDistance2D(a, b) {
      return a && b ? Math.hypot(a.x - b.x, a.y - b.y) : Infinity;
    }

    function smoothHandLandmarks(previous, next, amount = .40) {
      return next.map((point, index) => {
        const old = previous[index];
        if (!old) return { x: point.x, y: point.y, z: point.z || 0 };
        return {
          x: old.x + (point.x - old.x) * amount,
          y: old.y + (point.y - old.y) * amount,
          z: old.z + ((point.z || 0) - old.z) * amount
        };
      });
    }

    function handednessLabel(item) {
      return String(item?.label || item?.classification?.[0]?.label || '').toLowerCase();
    }

    function handleHandTrackingResults(results) {
      if (!faceTracking.enabled) return;
      const detected = results?.multiHandLandmarks || [];
      const handedness = results?.multiHandedness || [];
      const pose = upperBodyTracking.poseLandmarks;
      const poseWrists = { left: pose[15], right: pose[16] };
      const assignments = {};
      const available = ['left', 'right'];

      detected.forEach((landmarks, index) => {
        if (!landmarks?.length) return;
        let side = '';
        if (poseWrists.left && poseWrists.right && available.length) {
          side = available.reduce((best, candidate) =>
            landmarkDistance2D(landmarks[0], poseWrists[candidate]) < landmarkDistance2D(landmarks[0], poseWrists[best]) ? candidate : best,
          available[0]);
        } else {
          const label = handednessLabel(handedness[index]);
          side = label === 'left' || label === 'right' ? label : (landmarks[0].x > .5 ? 'left' : 'right');
          if (!available.includes(side)) side = available[0] || side;
        }
        assignments[side] = landmarks;
        const availableIndex = available.indexOf(side);
        if (availableIndex >= 0) available.splice(availableIndex, 1);
      });

      const now = performance.now();
      for (const side of ['left', 'right']) {
        const next = assignments[side];
        if (next) {
          upperBodyTracking.handLandmarks[side] = smoothHandLandmarks(upperBodyTracking.handLandmarks[side], next);
          upperBodyTracking.handLastSeen[side] = now;
          upperBodyTracking.dirty = true;
        } else if (upperBodyTracking.handLandmarks[side].length && now - upperBodyTracking.handLastSeen[side] > 320) {
          upperBodyTracking.handLandmarks[side] = [];
          upperBodyTracking.dirty = true;
        }
      }
    }

    function resetUpperBodyTracking() {
      upperBodyTracking.hasPose = false;
      upperBodyTracking.poseLandmarks = [];
      upperBodyTracking.armTargets.left = null;
      upperBodyTracking.armTargets.right = null;
      upperBodyTracking.armLastSeen.left = 0;
      upperBodyTracking.armLastSeen.right = 0;
      upperBodyTracking.handLandmarks.left = [];
      upperBodyTracking.handLandmarks.right = [];
      upperBodyTracking.handLastSeen.left = 0;
      upperBodyTracking.handLastSeen.right = 0;
      upperBodyTracking.lastPoseSeenAt = 0;
      upperBodyTracking.frameSequence = 0;
      upperBodyTracking.sendFailures.face = 0;
      upperBodyTracking.sendFailures.pose = 0;
      upperBodyTracking.sendFailures.hands = 0;
      upperBodyTracking.lastPipelineError = '';
      upperBodyTracking.dirty = true;
    }

    async function processNextTrackingPipeline(pipelines, image) {
      const pipeline = pipelines[upperBodyTracking.frameSequence % pipelines.length];
      upperBodyTracking.frameSequence++;
      try {
        await pipeline.model.send({ image });
        upperBodyTracking.sendFailures[pipeline.name] = 0;
        if (upperBodyTracking.lastPipelineError) {
          upperBodyTracking.lastPipelineError = '';
          syncFaceTrackingButton();
        }
        return { ok: true, name: pipeline.name, fatal: false };
      } catch (error) {
        upperBodyTracking.sendFailures[pipeline.name]++;
        const detail = error?.message || String(error) || 'Unknown model error';
        upperBodyTracking.lastPipelineError = `${pipeline.name} tracking error: ${detail}`;
        syncFaceTrackingButton();
        return {
          ok: false,
          name: pipeline.name,
          fatal: upperBodyTracking.sendFailures[pipeline.name] >= 4,
          error: detail
        };
      }
    }

    function stopFaceTracking(error = '') {
      faceTracking.sessionId++;
      faceTracking.enabled = false;
      faceTracking.starting = false;
      faceTracking.hasFace = false;
      faceTracking.landmarks = [];
      faceTracking.lastSeenAt = 0;
      faceTracking.inputRoll = 0;
      faceTracking.targetHeadRoll = 0;
      faceTracking.meshConnectionCount = 0;
      faceTracking.neckBufferConnectionCount = 0;
      faceTracking.headShellConnectionCount = 0;
      faceTracking.headShellRingCount = 0;
      faceTracking.headShellVertexCount = 0;
      faceTracking.headShellDepth = 0;
      if (faceTracking.frameId) cancelAnimationFrame(faceTracking.frameId);
      faceTracking.frameId = 0;

      const mesh = faceTracking.mesh;
      faceTracking.mesh = null;
      try {
        const closing = mesh?.close?.();
        if (closing?.catch) closing.catch(() => {});
      } catch (_) {}

      for (const key of ['poseModel', 'handsModel']) {
        const model = upperBodyTracking[key];
        upperBodyTracking[key] = null;
        try {
          const closing = model?.close?.();
          if (closing?.catch) closing.catch(() => {});
        } catch (_) {}
      }
      resetUpperBodyTracking();

      const stream = faceTracking.stream;
      faceTracking.stream = null;
      try { stream?.getTracks?.().forEach(track => track.stop()); } catch (_) {}
      try { faceTrackingVideo?.pause(); } catch (_) {}
      if (faceTrackingVideo) faceTrackingVideo.srcObject = null;

      faceTracking.error = error;
      faceTracking.status = error ? 'error' : 'off';
      syncFaceTrackingButton();
    }

    async function startFaceTracking() {
      if (faceTracking.starting || faceTracking.enabled) return;
      if (learningMode.playing || learningMode.preparingPlayback) stopLearningPlayback('Playback stopped for live camera.');
      faceTracking.starting = true;
      faceTracking.status = 'starting';
      faceTracking.error = '';
      syncFaceTrackingButton();
      const sessionId = ++faceTracking.sessionId;

      try {
        if (!faceTrackingVideo || !navigator.mediaDevices?.getUserMedia) {
          throw new Error('Webcam access requires HTTPS or localhost in a supported browser.');
        }

        // These classic MediaPipe bundles share lazy WebAssembly setup. Load them in order
        // and never initialize/send multiple graphs at the same time.
        await loadFaceTrackingScript(`${FACE_MESH_CDN}/face_mesh.js`);
        await loadFaceTrackingScript(`${POSE_CDN}/pose.js`);
        await loadFaceTrackingScript(`${HANDS_CDN}/hands.js`);
        if (sessionId !== faceTracking.sessionId) return;
        if (typeof window.FaceMesh !== 'function') throw new Error('MediaPipe FaceMesh did not initialize.');
        if (typeof window.Pose !== 'function') throw new Error('MediaPipe Pose did not initialize.');
        if (typeof window.Hands !== 'function') throw new Error('MediaPipe Hands did not initialize.');

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        if (sessionId !== faceTracking.sessionId) {
          stream.getTracks().forEach(track => track.stop());
          return;
        }

        faceTracking.stream = stream;
        faceTrackingVideo.srcObject = stream;
        await faceTrackingVideo.play();

        const mesh = new window.FaceMesh({
          locateFile: file => `${FACE_MESH_CDN}/${file}`
        });
        mesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: .5,
          minTrackingConfidence: .5
        });
        mesh.onResults(handleFaceTrackingResults);
        faceTracking.mesh = mesh;

        const poseModel = new window.Pose({
          locateFile: file => `${POSE_CDN}/${file}`
        });
        poseModel.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: .55,
          minTrackingConfidence: .55
        });
        poseModel.onResults(handlePoseTrackingResults);
        upperBodyTracking.poseModel = poseModel;

        const handsModel = new window.Hands({
          locateFile: file => `${HANDS_CDN}/${file}`
        });
        handsModel.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: .55,
          minTrackingConfidence: .55
        });
        handsModel.onResults(handleHandTrackingResults);
        upperBodyTracking.handsModel = handsModel;
        faceTracking.enabled = true;
        faceTracking.starting = false;
        faceTracking.status = 'searching';
        setCameraView('front');
        syncFaceTrackingButton();

        const pipelines = [
          { name: 'face', model: mesh },
          { name: 'pose', model: poseModel },
          { name: 'hands', model: handsModel }
        ];

        const pump = async () => {
          if (!faceTracking.enabled || faceTracking.mesh !== mesh || sessionId !== faceTracking.sessionId) return;
          if (faceTrackingVideo.readyState >= 2) {
            const result = await processNextTrackingPipeline(pipelines, faceTrackingVideo);
            if (result.fatal) {
              stopFaceTracking(`Unable to run ${result.name} tracking. Stop and retry the camera.`);
              return;
            }
          }
          if (faceTracking.enabled && faceTracking.mesh === mesh && sessionId === faceTracking.sessionId) {
            faceTracking.frameId = requestAnimationFrame(pump);
          }
        };
        faceTracking.frameId = requestAnimationFrame(pump);
      } catch (error) {
        const message = error?.name === 'NotAllowedError'
          ? 'Camera permission was denied. Allow webcam access and retry.'
          : error?.message || 'Unable to start face tracking.';
        stopFaceTracking(message);
      } finally {
        if (sessionId === faceTracking.sessionId && !faceTracking.enabled) {
          faceTracking.starting = false;
          syncFaceTrackingButton();
        }
      }
    }

    function setLearningStatus(message, status = 'ready') {

    function openLearningDatabase() {
      if (learningMode.databasePromise) return learningMode.databasePromise;
      learningMode.databasePromise = new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          reject(new Error('This browser does not support saved learning sessions.'));
          return;
        }
        const request = indexedDB.open(LEARNING_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(LEARNING_DB_STORE)) {
            database.createObjectStore(LEARNING_DB_STORE, { keyPath: 'id' });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('Unable to open learning-session storage.'));
      });
      return learningMode.databasePromise;
    }

    async function readStoredLearningSessions() {
      const database = await openLearningDatabase();
      return new Promise((resolve, reject) => {
        const request = database.transaction(LEARNING_DB_STORE, 'readonly').objectStore(LEARNING_DB_STORE).getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error || new Error('Unable to read learning sessions.'));
      });
    }

    async function persistLearningSession(session) {
      const database = await openLearningDatabase();
      return new Promise((resolve, reject) => {
        const request = database.transaction(LEARNING_DB_STORE, 'readwrite').objectStore(LEARNING_DB_STORE).put(session);
        request.onsuccess = () => resolve(session);
        request.onerror = () => reject(request.error || new Error('Unable to save this learning session.'));
      });
    }

    function learningDurationLabel(durationMs) {
      const seconds = Math.max(0, durationMs || 0) / 1000;
      return seconds < 10 ? `${seconds.toFixed(1)}s` : `${Math.round(seconds)}s`;
    }

    function renderLearningSessions() {
      if (!learningSessionList) return;
      learningSessionList.textContent = '';
      if (!learningMode.sessions.length) {
        const empty = document.createElement('div');
        empty.className = 'learning-empty';
        empty.textContent = 'No saved sessions yet.';
        learningSessionList.appendChild(empty);
        return;
      }
      for (const session of learningMode.sessions) {
        const item = document.createElement('div');
        item.className = 'learning-session';
        const meta = document.createElement('div');
        meta.className = 'session-meta';
        const name = document.createElement('div');
        name.className = 'session-name';
        name.textContent = session.name;
        const detail = document.createElement('div');
        detail.className = 'session-detail';
        detail.textContent = `${learningDurationLabel(session.durationMs)} · ${session.frames.length} frames · lower body N/A`;
        meta.append(name, detail);
        const play = document.createElement('button');
        play.className = 'session-action';
        play.type = 'button';
        const isCurrentSession = learningMode.playbackSessionId === session.id;
        play.textContent = learningMode.preparingPlayback && isCurrentSession
          ? 'Loading'
          : learningMode.playing && isCurrentSession
            ? 'Playing'
            : 'Play';
        play.disabled = learningMode.recording || learningMode.preparingPlayback || (learningMode.playing && isCurrentSession);
        play.addEventListener('click', () => playLearningSession(session.id));
        const download = document.createElement('button');
        download.className = 'session-action';
        download.type = 'button';
        download.textContent = 'JSON';
        download.disabled = learningMode.recording;
        download.addEventListener('click', () => downloadLearningSession(session.id));
        item.append(meta, play, download);
        learningSessionList.appendChild(item);
      }

    function compactLandmark(point) {
      if (!point) return null;
      const round = value => Math.round((Number(value) || 0) * 10000) / 10000;
      return [round(point.x), round(point.y), round(point.z)];
    }

    function compactLandmarks(landmarks, limit = landmarks?.length || 0) {
      if (!landmarks?.length) return null;
      return Array.from({ length: Math.min(limit, landmarks.length) }, (_, index) => compactLandmark(landmarks[index]));
    }

    function expandLandmarks(compact) {
      if (!compact?.length) return [];
      return compact.map(point => point ? { x: point[0], y: point[1], z: point[2] } : null);
    }

    function captureLearningFrame(now) {
      if (!learningMode.recording || now - learningMode.lastCaptureAt < LEARNING_SAMPLE_INTERVAL_MS) return;
      learningMode.lastCaptureAt = now;
      const hasFace = faceTracking.hasFace && faceTracking.landmarks.length > 0;
      const hasPose = upperBodyTracking.hasPose && upperBodyTracking.poseLandmarks.length > 0;
      const hasLeftHand = upperBodyTracking.handLandmarks.left.length >= 21;
      const hasRightHand = upperBodyTracking.handLandmarks.right.length >= 21;
      if (!hasFace && !hasPose && !hasLeftHand && !hasRightHand) return;
      if (!learningMode.firstFrameAt) learningMode.firstFrameAt = now;
      learningMode.frames.push({
        timeMs: Math.round(now - learningMode.firstFrameAt),
        facialExpression: {
          landmarks: hasFace ? compactLandmarks(faceTracking.landmarks) : null
        },
        bodyGesture: {
          upperBody: {
            poseLandmarks: hasPose ? compactLandmarks(upperBodyTracking.poseLandmarks, 17) : null,
            leftHandLandmarks: hasLeftHand ? compactLandmarks(upperBodyTracking.handLandmarks.left, 21) : null,
            rightHandLandmarks: hasRightHand ? compactLandmarks(upperBodyTracking.handLandmarks.right, 21) : null
          },
          lowerBody: 'N/A'
        }
      });
      if (learningMode.frames.length % 8 === 0) {
        setLearningStatus(`Recording · ${learningDurationLabel(now - learningMode.firstFrameAt)} · ${learningMode.frames.length} frames`, 'recording');
      }
    }

    function clearPlaybackTracking() {
      faceTracking.hasFace = false;
      faceTracking.landmarks = [];
      faceTracking.inputRoll = 0;
      faceTracking.targetHeadRoll = 0;
      faceTracking.meshConnectionCount = 0;
      faceTracking.neckBufferConnectionCount = 0;
      faceTracking.headShellConnectionCount = 0;
      faceTracking.headShellRingCount = 0;
      faceTracking.headShellVertexCount = 0;
      faceTracking.headShellDepth = 0;
      faceTracking.status = faceTracking.enabled ? 'searching' : 'off';
      resetUpperBodyTracking();
    }

    function applyLearningFrame(frame) {
      const face = expandLandmarks(frame?.facialExpression?.landmarks);
      faceTracking.hasFace = face.length > 0;
      faceTracking.landmarks = face;
      faceTracking.status = 'playback';
      faceTracking.lastSeenAt = performance.now();
      if (face.length) updateTrackedFaceRoll(face);
      else {
        faceTracking.inputRoll = 0;
        faceTracking.targetHeadRoll = 0;
      }

      const upperBody = frame?.bodyGesture?.upperBody || {};
      const pose = expandLandmarks(upperBody.poseLandmarks);
      upperBodyTracking.poseLandmarks = pose;
      upperBodyTracking.armTargets.left = pose.length ? mappedArmTarget('left', pose) : null;
      upperBodyTracking.armTargets.right = pose.length ? mappedArmTarget('right', pose) : null;
      upperBodyTracking.hasPose = Boolean(upperBodyTracking.armTargets.left || upperBodyTracking.armTargets.right);
      upperBodyTracking.handLandmarks.left = expandLandmarks(upperBody.leftHandLandmarks);
      upperBodyTracking.handLandmarks.right = expandLandmarks(upperBody.rightHandLandmarks);
      upperBodyTracking.dirty = true;
    }

    function sessionHasFacialTracking(session) {
      return session?.frames?.some(frame => frame?.facialExpression?.landmarks?.length >= 468);
    }

    async function prepareLearningPlayback(session) {
      if (!sessionHasFacialTracking(session) || trackedFaceTessellation().length) return;
      await loadFaceTrackingScript(`${FACE_MESH_CDN}/face_mesh.js`);
      if (!trackedFaceTessellation().length) {
        throw new Error('The saved facial mesh definition could not be initialized.');
      }
    }

    function stopLearningPlayback(message = 'Playback stopped.') {
      learningMode.playbackRequestId++;
      if (learningMode.playbackFrameId) cancelAnimationFrame(learningMode.playbackFrameId);
      learningMode.playbackFrameId = 0;
      learningMode.playing = false;
      learningMode.preparingPlayback = false;
      learningMode.playbackSessionId = '';
      learningMode.playbackFrameIndex = -1;
      clearPlaybackTracking();
      syncLearningModeControls();
      renderLearningSessions();
      setLearningStatus(message, 'ready');
    }

    async function playLearningSession(sessionId) {
      if (learningMode.recording) return;
      const session = learningMode.sessions.find(item => item.id === sessionId);
      if (!session?.frames?.length) {
        setLearningStatus('This session has no playable tracking frames.', 'error');
        return;
      }
      if (learningMode.playing || learningMode.preparingPlayback) stopLearningPlayback();
      if (faceTracking.enabled || faceTracking.starting) stopFaceTracking();
      const playbackRequestId = ++learningMode.playbackRequestId;
      learningMode.preparingPlayback = true;
      learningMode.playbackSessionId = session.id;
      syncLearningModeControls();
      renderLearningSessions();
      setLearningStatus(`Preparing ${session.name}…`, 'playing');
      try {
        await prepareLearningPlayback(session);
      } catch (error) {
        if (playbackRequestId !== learningMode.playbackRequestId) return;
        learningMode.preparingPlayback = false;
        learningMode.playbackSessionId = '';
        clearPlaybackTracking();
        syncLearningModeControls();
        renderLearningSessions();
        setLearningStatus(error?.message || 'Unable to prepare saved facial playback.', 'error');
        return;
      }
      if (playbackRequestId !== learningMode.playbackRequestId) return;
      learningMode.preparingPlayback = false;
      learningMode.playing = true;
      learningMode.playbackFrameIndex = -1;
      learningMode.playbackStartedAt = performance.now();
      syncLearningModeControls();
      renderLearningSessions();
      setLearningStatus(`Playing ${session.name}`, 'playing');
      applyLearningFrame(session.frames[0]);
      learningMode.playbackFrameIndex = 0;
      const playbackTick = now => {
        if (!learningMode.playing || learningMode.playbackSessionId !== session.id) return;
        const elapsed = now - learningMode.playbackStartedAt;
        while (learningMode.playbackFrameIndex + 1 < session.frames.length &&
          session.frames[learningMode.playbackFrameIndex + 1].timeMs <= elapsed) {
          learningMode.playbackFrameIndex++;
          applyLearningFrame(session.frames[learningMode.playbackFrameIndex]);
        }
        if (learningMode.playbackFrameIndex >= session.frames.length - 1 && elapsed >= session.durationMs) {
          stopLearningPlayback('Playback complete.');
          return;
        }
        learningMode.playbackFrameId = requestAnimationFrame(playbackTick);
      };
      learningMode.playbackFrameId = requestAnimationFrame(playbackTick);
    }

    function downloadLearningSession(sessionId) {
      const session = learningMode.sessions.find(item => item.id === sessionId);
      if (!session) return;
      const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${session.id}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setLearningStatus(`Exported ${session.name} as JSON.`, 'ready');
    }

    function startLearningRecording() {
      if (learningMode.playing || learningMode.preparingPlayback) stopLearningPlayback('Playback stopped for recording.');
      learningMode.recording = true;
      learningMode.startedAt = performance.now();
      learningMode.firstFrameAt = 0;
      learningMode.lastCaptureAt = 0;
      learningMode.frames = [];
      syncLearningModeControls();
      renderLearningSessions();
      setLearningStatus('Learning is on · waiting for tracked face or upper body…', 'recording');
      if (!faceTracking.enabled && !faceTracking.starting) startFaceTracking();
    }

    async function stopLearningRecording() {
      if (!learningMode.recording) return;
      learningMode.recording = false;
      syncLearningModeControls();
      if (!learningMode.frames.length) {
        setLearningStatus('Learning stopped · no tracking data was captured.', 'ready');
        renderLearningSessions();
        return;
      }
      const createdAt = new Date();
      const durationMs = learningMode.frames[learningMode.frames.length - 1].timeMs;
      const session = {
        schemaVersion: 1,
        format: 'figure-learning-json',
        id: `learning-session-${createdAt.getTime()}`,
        name: `Session ${createdAt.toLocaleString()}`,
        createdAt: createdAt.toISOString(),
        durationMs,
        sampleIntervalMs: LEARNING_SAMPLE_INTERVAL_MS,
        trackedData: ['facialExpression', 'upperBodyPose', 'leftHand', 'rightHand'],
        lowerBody: 'N/A',
        frames: learningMode.frames
      };
      learningMode.frames = [];
      try {
        await persistLearningSession(session);
        learningMode.sessions = [session, ...learningMode.sessions.filter(item => item.id !== session.id)];
        renderLearningSessions();
        setLearningStatus(`Saved ${session.name} · ${session.frames.length} frames.`, 'saved');
      } catch (error) {
        learningMode.sessions = [session, ...learningMode.sessions];
        renderLearningSessions();
        setLearningStatus(`Session kept for this page, but browser storage failed: ${error?.message || error}`, 'error');
      }
    }

    async function initializeLearningMode() {
      syncLearningModeControls();
      try {
        const sessions = await readStoredLearningSessions();
        learningMode.sessions = sessions.sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
        renderLearningSessions();
      } catch (error) {
        renderLearningSessions();
        setLearningStatus(`Ready, but saved-session storage is unavailable: ${error?.message || error}`, 'error');
      }
    }

    learningModeToggle?.addEventListener('click', () => {

    function bindWalkButton(id, key) {
      const button = document.getElementById(id);
      if (!button) return;
      const start = e => {
        e.preventDefault();
        stopAutoMovesForManual();
        deactivatePostureMotions();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkKey(key, true);
        try { button.setPointerCapture(e.pointerId); } catch (_) {}
      };
      const stop = e => {
        e.preventDefault();
        setWalkKey(key, false);
        try { button.releasePointerCapture(e.pointerId); } catch (_) {}
      };
      button.addEventListener('pointerdown', start);
      button.addEventListener('pointerup', stop);
      button.addEventListener('pointercancel', stop);
      button.addEventListener('pointerleave', e => { if (walkKeys[key]) stop(e); });
    }

    function normalizeAngle(angle) {
      return Math.atan2(Math.sin(angle), Math.cos(angle));
    }

    function syncCameraViewButtons() {
      Object.values(CAMERA_VIEWS).forEach(view => {
        const active = Math.abs(rotationX - view.x) < .012 && Math.abs(normalizeAngle(rotationY - view.y)) < .012;
        document.getElementById(view.id)?.classList.toggle('active', active);
      });
    }

    function setCameraView(name) {
      const view = CAMERA_VIEWS[name];
      if (!view) return;
      rotationX = view.x;
      rotationY = view.y;
      zoomScale = view.zoom;
      cameraVerticalOffset = view.verticalOffset;
      resize();
      velocityX = 0;
      velocityY = 0;
      syncCameraViewButtons();
      updateCameraReadout();
    }

    function angleDegrees(angle) {
      const deg = Math.round(normalizeAngle(angle) * 180 / Math.PI);
      return deg === -180 ? 180 : deg;
    }

    function walkDirectionName(angle) {
      const deg = angleDegrees(angle);
      if (Math.abs(deg) <= 22) return 'Forward';
      if (Math.abs(Math.abs(deg) - 180) <= 22) return 'Back';
      if (deg < 0 && Math.abs(deg + 90) <= 22) return 'Left';
      if (deg > 0 && Math.abs(deg - 90) <= 22) return 'Right';
      return deg < 0 ? 'Turn left' : 'Turn right';
    }

    function syncWalkDirectionConsole() {
      const readout = document.getElementById('walkDirectionReadout');
      const deg = angleDegrees(walkHeadingTarget);
      if (readout) readout.textContent = `${walkDirectionName(walkHeadingTarget)} ${deg} deg\nX ${walkPosition.x.toFixed(2)}  Z ${walkPosition.z.toFixed(2)}`;
      const states = [
        ['walkDirForward', 0],
        ['walkDirLeft', -Math.PI / 2],
        ['walkDirRight', Math.PI / 2],
        ['walkDirBack', Math.PI]
      ];
      states.forEach(([id, angle]) => {
        const active = Math.abs(normalizeAngle(walkHeadingTarget - angle)) < .001;
        document.getElementById(id)?.classList.toggle('active', active);
      });
      document.getElementById('walkDirReset')?.classList.toggle('active', Math.abs(normalizeAngle(walkHeadingTarget)) < .001);
    }

    function setWalkHeading(angle) {
      walkHeadingTarget = normalizeAngle(angle);
      syncWalkDirectionConsole();
    }

    function setWalkKey(key, active) {
      if (!Object.prototype.hasOwnProperty.call(walkKeys, key)) return;
      walkKeys[key] = active;
      const ids = { w: 'walkDirForward', a: 'walkDirLeft', s: 'walkDirBack', d: 'walkDirRight' };
      document.getElementById(ids[key])?.classList.toggle('active', active);
    }

    function clearWalkKeys() {
      Object.keys(walkKeys).forEach(key => setWalkKey(key, false));
    }

    function resetWalkPosition() {
      clearWalkKeys();
      walkPosition = { x: 0, z: 0 };
      walkVelocity = { x: 0, z: 0 };
      walkMoveBlend = 0;
      setWalkHeading(0);
    }

    function walkInputVector() {
      const x = (walkKeys.d ? 1 : 0) - (walkKeys.a ? 1 : 0);
      const z = (walkKeys.w ? 1 : 0) - (walkKeys.s ? 1 : 0);
      const length = Math.hypot(x, z);
      return length > .001 ? { x: x / length, z: z / length, active: true } : { x: 0, z: 0, active: false };
    }

    function updateWalkDisplacement(frameStep) {
      const input = walkInputVector();
      const targetSpeed = .018;
      const targetVelocity = input.active ? { x: input.x * targetSpeed, z: input.z * targetSpeed } : { x: 0, z: 0 };
      if (input.active) walkHeadingTarget = normalizeAngle(Math.atan2(input.x, input.z));
      walkVelocity.x += (targetVelocity.x - walkVelocity.x) * Math.min(1, .22 * frameStep);
      walkVelocity.z += (targetVelocity.z - walkVelocity.z) * Math.min(1, .22 * frameStep);
      walkPosition.x = Math.max(-1.18, Math.min(1.18, walkPosition.x + walkVelocity.x * frameStep));
      walkPosition.z = Math.max(-1.18, Math.min(1.18, walkPosition.z + walkVelocity.z * frameStep));
      walkMoveBlend = input.active || Math.hypot(walkVelocity.x, walkVelocity.z) > .001
        ? Math.min(1, walkMoveBlend + .070 * frameStep)
        : Math.max(0, walkMoveBlend - .050 * frameStep);
      syncWalkDirectionConsole();
    }

    function syncAutoMovesToggle() {
      const button = document.getElementById('autoMovesToggle');
      if (!button) return;
      button.classList.toggle('active', autoMovesActive);
      const step = AUTO_MOVES[autoMoveIndex];
      button.textContent = autoMovesActive && step
        ? (autoMovePhase === 'buffer' ? 'Auto Buffer' : `Auto ${step.label}`)
        : 'Auto Moves';
    }

    function resetAutoActuators() {
      runMotion = false;
      moonwalkMotion = false;
      spinMotion = false;
      deactivatePostureMotions();
      document.getElementById('runToggle')?.classList.remove('active');
      document.getElementById('moonwalkToggle')?.classList.remove('active');
      document.getElementById('spinToggle')?.classList.remove('active');
      clearWalkKeys();
    }

    function activateAutoMove(move) {
      resetAutoActuators();
      if (move.kind === 'run') {
        runMotion = true;
        if (runBlend <= .001) runTime = 0;
        document.getElementById('runToggle')?.classList.add('active');
      } else if (move.kind === 'moonwalk') {
        moonwalkMotion = true;
        if (moonwalkBlend <= .001) runTime = 0;
        document.getElementById('moonwalkToggle')?.classList.add('active');
      } else if (move.kind === 'spin') {
        spinMotion = true;
        if (spinBlend <= .001) {
          runTime = 0;
          spinAngle = 0;
        }
        document.getElementById('spinToggle')?.classList.add('active');
      } else if (move.kind === 'crouch') {
        crouchMotion = true;
        document.getElementById('crouchToggle')?.classList.add('active');
      } else if (move.kind === 'squat') {
        squatMotion = true;
        document.getElementById('squatToggle')?.classList.add('active');
      } else if (move.kind === 'jump') {
        jumpActive = true;
        jumpTime = 0;
      } else if (move.kind === 'walk') {
        setWalkKey(move.key, true);
      }
      syncAutoMovesToggle();
    }

    function setAutoMoves(active) {
      autoMovesActive = active;
      autoMoveIndex = 0;
      autoMoveClock = 0;
      autoMovePhase = active ? 'buffer' : 'buffer';
      resetAutoActuators();
      if (active) {
        resetWalkPosition();
        runTime = 0;
      }
      syncAutoMovesToggle();
    }

    function stopAutoMovesForManual() {
      if (!autoMovesActive) return;
      autoMovesActive = false;
      autoMoveClock = 0;
      autoMovePhase = 'buffer';
      resetAutoActuators();
      syncAutoMovesToggle();
    }

    function updateAutoMoves(frameStep) {
      if (!autoMovesActive) return;
      const move = AUTO_MOVES[autoMoveIndex];
      autoMoveClock += frameStep;
      if (autoMovePhase === 'buffer') {
        resetAutoActuators();
        if (autoMoveClock >= move.buffer && jumpTime >= 1) {
          autoMovePhase = 'move';
          autoMoveClock = 0;
          activateAutoMove(move);
        }
      } else if (autoMoveClock >= move.duration) {
        resetAutoActuators();
        autoMoveIndex = (autoMoveIndex + 1) % AUTO_MOVES.length;
        autoMovePhase = 'buffer';
        autoMoveClock = 0;
        syncAutoMovesToggle();
      }
    }

    function hexToRgba(hex, alpha = 1) {
      const clean = hex.replace('#','');
      const value = parseInt(clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean, 16);
      return `rgba(${(value>>16)&255},${(value>>8)&255},${value&255},${alpha})`;
    }

    function meshControlKey(part) {
      if (part === 'head') return 'head';
      if (part === 'neck') return 'neck';
      if (part === 'torso') return 'torso';
      if (part === 'waist') return 'waist';
      if (part === 'pelvis') return 'pelvis';
      if (part === 'hipSurface') return 'hip';
      if (part === 'shoulder') return 'shoulder';
      if (part === 'arm') return 'arm';
      if (part === 'elbow') return 'elbow';
      if (part === 'wrist') return 'wrist';
      if (part === 'palm') return 'palm';
      if (['knuckle','finger','fingerJoint','fingerTip'].includes(part)) return 'finger';
      if (part === 'leg') return 'thigh';
      if (part === 'calfMesh') return 'calf';
      if (part === 'knee') return 'knee';
      if (part === 'ankle') return 'ankle';
      if (part === 'heel') return 'heel';
      if (part === 'foot' || part === 'forefoot') return 'foot';
      if (['toe','toeJoint','toeTip'].includes(part)) return 'toe';
      if (part === 'toeNail') return 'toeNails';
      if (['boot','bootSole','bootHeel','bootRim','bootSeam'].includes(part)) return 'boot';
      if (part === 'bone') return 'bone';
      return '';
    }
    function meshDisplayColor(part) {
      const key = meshControlKey(part);
      if (key && meshControls[key].colorized) return meshControls[key].color;
      if (key) return displayTheme === 'dark' ? DARK_FIGURE_INK : '#111111';
      return '';
    }

    function isHiddenPart(part) { return part === 'coveredMesh'; }
    function isBootPart(part) { return ['boot','bootSole','bootHeel','bootRim','bootSeam'].includes(part); }

    function addPoint(x, y, z, part, weight = 1, meta = null) {
      points.push({ x, y, z, part, weight, ...(meta || {}), jitter: ((points.length * 9301) % 997) / 997 });
      return points.length - 1;
    }
    function addLink(a, b, strength = 1) { if (a >= 0 && b >= 0) links.push({ a, b, strength }); }
    function addFace(ids, part, alpha = .16) { if (ids.every(id => id >= 0)) faces.push({ ids, part, alpha }); }
    function normalize(v) { const len = Math.hypot(v.x,v.y,v.z) || 1; return { x:v.x/len, y:v.y/len, z:v.z/len }; }
    function cross(a,b) { return { x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x }; }
    function basisFromEndpoints(a,b) {
      const axis = normalize({ x:b.x-a.x, y:b.y-a.y, z:b.z-a.z });
      const helper = Math.abs(axis.y) < .95 ? {x:0,y:1,z:0} : {x:1,y:0,z:0};
      const side = normalize(cross(axis, helper));
      const forward = normalize(cross(side, axis));
      return { axis, side, forward };
    }

    function buildEllipsoid(cx, cy, cz, rx, ry, rz, latSteps, lonSteps, part) {
      const grid = [];
      for (let i=0;i<=latSteps;i++) {
        const v = -Math.PI/2 + Math.PI*i/latSteps, row=[];
        const ringScale = Math.cos(v);
        for (let j=0;j<lonSteps;j++) {
          const u = Math.PI*2*j/lonSteps;
          row.push(addPoint(cx + rx*ringScale*Math.sin(u), cy + ry*Math.sin(v), cz + rz*ringScale*Math.cos(u), part, 1));
        }
        grid.push(row);
      }
      for (let i=0;i<=latSteps;i++) for (let j=0;j<lonSteps;j++) {
        addLink(grid[i][j], grid[i][(j+1)%lonSteps], .78);
        if (i < latSteps) addLink(grid[i][j], grid[i+1][j], .78);
      }
      return grid;
    }

    function buildTaperedTube(a,b,rA,rB,ringSteps,radialSteps,part) {
      const basis = basisFromEndpoints(a,b), grid=[];
      for (let i=0;i<=ringSteps;i++) {
        const t=i/ringSteps, radius=rA+(rB-rA)*t;
        const center = { x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t };
        const row=[];
        for (let j=0;j<radialSteps;j++) {
          const angle=Math.PI*2*j/radialSteps;
          row.push(addPoint(
            center.x + Math.cos(angle)*basis.side.x*radius + Math.sin(angle)*basis.forward.x*radius,
            center.y + Math.cos(angle)*basis.side.y*radius + Math.sin(angle)*basis.forward.y*radius,
            center.z + Math.cos(angle)*basis.side.z*radius + Math.sin(angle)*basis.forward.z*radius,
            part, .96));
        }
        grid.push(row);
      }
      for (let i=0;i<=ringSteps;i++) for (let j=0;j<radialSteps;j++) {
        addLink(grid[i][j], grid[i][(j+1)%radialSteps], .72);
        if (i < ringSteps) addLink(grid[i][j], grid[i+1][j], .8);
      }
      return grid;
    }

    function buildEllipticalTube(a,b,ringSteps,radialSteps,part,profile) {
      const basis = basisFromEndpoints(a,b), grid=[];
      for (let i=0;i<=ringSteps;i++) {
        const t=i/ringSteps;
        const shape=profile(t);
        const center = {
          x:a.x+(b.x-a.x)*t + basis.side.x*(shape.offsetSide||0) + basis.forward.x*(shape.offsetForward||0),
          y:a.y+(b.y-a.y)*t + basis.side.y*(shape.offsetSide||0) + basis.forward.y*(shape.offsetForward||0),
          z:a.z+(b.z-a.z)*t + basis.side.z*(shape.offsetSide||0) + basis.forward.z*(shape.offsetForward||0)
        };
        const row=[];
        for (let j=0;j<radialSteps;j++) {
          const angle=Math.PI*2*j/radialSteps;
          row.push(addPoint(
            center.x + Math.cos(angle)*basis.side.x*shape.side + Math.sin(angle)*basis.forward.x*shape.forward,
            center.y + Math.cos(angle)*basis.side.y*shape.side + Math.sin(angle)*basis.forward.y*shape.forward,
            center.z + Math.cos(angle)*basis.side.z*shape.side + Math.sin(angle)*basis.forward.z*shape.forward,
            shape.part || part,
            shape.weight || 1,
            shape.meta || null));
        }
        grid.push(row);
      }
      for (let i=0;i<=ringSteps;i++) for (let j=0;j<radialSteps;j++) {
        addLink(grid[i][j], grid[i][(j+1)%radialSteps], .82);
        if (i < ringSteps) {
          addLink(grid[i][j], grid[i+1][j], .88);
          addFace([grid[i][j], grid[i][(j+1)%radialSteps], grid[i+1][(j+1)%radialSteps], grid[i+1][j]], part, .15);
        }
      }
      return grid;
    }

    function strengthenRing(row, strength = 1.45) {
      for (let j=0;j<row.length;j++) addLink(row[j], row[(j+1)%row.length], strength);
    }

    function capRing(row, part, weight = 1.08, strength = 1.18, meta = null) {
      const center = row.reduce((acc, id) => {
        const p = points[id];
        acc.x += p.x; acc.y += p.y; acc.z += p.z;
        return acc;
      }, { x: 0, y: 0, z: 0 });
      center.x /= row.length; center.y /= row.length; center.z /= row.length;
      const c = addPoint(center.x, center.y, center.z, part, weight, meta);
      for (let j=0;j<row.length;j++) {
        addLink(c, row[j], strength);
        addLink(row[j], row[(j+Math.floor(row.length/2))%row.length], strength*.52);
        addFace([c, row[j], row[(j+1)%row.length]], part, .22);
      }
      return c;
    }

    function buildSolePlate(side, ankleX, ankleY, footZ) {
      const sign = side === 'left' ? -1 : 1;
      const stations = [
        { z: footZ - .305, w: .116, y: ankleY + .214, x: 0, t: .060 },
        { z: footZ - .135, w: .160, y: ankleY + .222, x: 0, t: .064 },
        { z: footZ + .085, w: .182, y: ankleY + .226, x: sign*.006, t: .066 },
        { z: footZ + .325, w: .174, y: ankleY + .226, x: sign*.018, t: .064 },
        { z: footZ + .555, w: .124, y: ankleY + .218, x: sign*.026, t: .058 }
      ];
      const topAcross = [-1, -.5, 0, .5, 1];
      const bottomAcross = [1, .5, 0, -.5, -1];
      const grid=[];
      for (const station of stations) {
        const row=[];
        for (const sideT of topAcross) {
          row.push(addPoint(
            ankleX + station.x + sideT * station.w,
            station.y,
            station.z,
            'bootSole',
            1.08,
            { bootSide: side }));
        }
        for (const sideT of bottomAcross) {
          row.push(addPoint(
            ankleX + station.x + sideT * station.w,
            station.y + station.t,
            station.z,
            'bootSole',
            1.08,
            { bootSide: side }));
        }
        grid.push(row);
      }
      for (let i=0;i<grid.length;i++) for (let j=0;j<grid[i].length;j++) {
        addLink(grid[i][j], grid[i][(j+1)%grid[i].length], 1.1);
        if (i < grid.length-1) {
          addLink(grid[i][j], grid[i+1][j], 1.12);
          addFace([grid[i][j], grid[i+1][j], grid[i+1][(j+1)%grid[i].length], grid[i][(j+1)%grid[i].length]], 'bootSole', .22);
        }
      }
      addFace(grid[0], 'bootSole', .24);
      addFace(grid[grid.length-1], 'bootSole', .24);
      return grid;
    }

    function buildBootFootShell(a,b,ringSteps,part,profile) {
      const basis = basisFromEndpoints(a,b), grid=[];
      const section = [
        { s: -1, f: 1.00 },
        { s: -.98, f: .42 },
        { s: -.78, f: -.22 },
        { s: -.38, f: -.78 },
        { s: 0, f: -1.00 },
        { s: .38, f: -.78 },
        { s: .78, f: -.22 },
        { s: .98, f: .42 },
        { s: 1, f: 1.00 }
      ];
      for (let i=0;i<=ringSteps;i++) {
        const t=i/ringSteps;
        const shape=profile(t);
        const center = {
          x:a.x+(b.x-a.x)*t + basis.side.x*(shape.offsetSide||0) + basis.forward.x*(shape.offsetForward||0),
          y:a.y+(b.y-a.y)*t + basis.side.y*(shape.offsetSide||0) + basis.forward.y*(shape.offsetForward||0),
          z:a.z+(b.z-a.z)*t + basis.side.z*(shape.offsetSide||0) + basis.forward.z*(shape.offsetForward||0)
        };
        const row = section.map(p => addPoint(
          center.x + p.s*basis.side.x*shape.side + p.f*basis.forward.x*shape.forward,
          center.y + p.s*basis.side.y*shape.side + p.f*basis.forward.y*shape.forward,
          center.z + p.s*basis.side.z*shape.side + p.f*basis.forward.z*shape.forward,
          part,
          shape.weight || 1,
          shape.meta || null));
        grid.push(row);
      }
      for (let i=0;i<grid.length;i++) for (let j=0;j<grid[i].length;j++) {
        addLink(grid[i][j], grid[i][(j+1)%grid[i].length], j === grid[i].length-1 ? 1.28 : .92);
        if (i < grid.length-1) {
          addLink(grid[i][j], grid[i+1][j], .96);
          addFace([grid[i][j], grid[i][(j+1)%grid[i].length], grid[i+1][(j+1)%grid[i].length], grid[i+1][j]], part, .16);
        }
      }
      return grid;
    }

    function buildHeelBlock(side, ankleX, ankleY, footZ) {
      const sign = side === 'left' ? -1 : 1;
      const x0=ankleX-sign*.070, x1=ankleX+sign*.070;
      const y0=ankleY+.252, y1=ankleY+.318;
      const z0=footZ-.238, z1=footZ-.128;
      const corners=[
        [x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1],
        [x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]
      ].map(([x,y,z])=>addPoint(x,y,z,'bootHeel',1.12,{ bootSide: side }));
      [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(([a,b])=>addLink(corners[a],corners[b],1.08));
      [[0,1,2,3],[4,7,6,5],[0,4,5,1],[1,5,6,2],[2,6,7,3],[3,7,4,0]].forEach(ids=>addFace(ids.map(i=>corners[i]), 'bootHeel', .22));
      const center=addPoint(ankleX, (y0+y1)/2, (z0+z1)/2, 'bootHeel', 1.02, { bootSide: side });
      corners.forEach(c=>addLink(center,c,.42));
      return corners;
    }

    function buildRidingBoot(side, kneeX, kneeY, kneeZ, ankleX, ankleY, ankleZ, shinBottomY, footZ) {
      const sign = side === 'left' ? -1 : 1;
      const radial = 22;
      const offset = bootState[side].offset;
      const w = p => ({ x: p.x + offset.x, y: p.y + offset.y, z: p.z + offset.z });
      const bootMeta = { bootSide: side };
      const bootAnkleX = ankleX + offset.x;
      const bootAnkleY = ankleY + offset.y;
      const bootFootZ = footZ + offset.z;
      const shaftTop=w({ x:kneeX+sign*.012, y:kneeY+.250, z:kneeZ+.020 });
      const shaftBottom=w({ x:ankleX+sign*.006, y:shinBottomY+.060, z:ankleZ+.010 });
      const shaft=buildEllipticalTube(shaftTop, shaftBottom, 13, radial, 'boot', t => {
        const calf=Math.sin(Math.PI*t);
        const taper=1-t;
        return {
          side: .115 + .042*taper + .020*calf,
          forward: .105 + .028*taper + .014*calf,
          weight: 1.08,
          meta: bootMeta
        };
      });
      strengthenRing(shaft[0], 2.1);
      strengthenRing(shaft[1], 1.25);
      strengthenRing(shaft[shaft.length-1], 1.45);

      const ankleWrap=buildEllipticalTube(
        w({ x:ankleX+sign*.006, y:shinBottomY-.020, z:ankleZ+.005 }),
        w({ x:ankleX+sign*.018, y:ankleY+.075, z:footZ-.080 }),
        5, radial, 'boot', t => ({
          side: .126 - .010*t,
          forward: .104 + .012*Math.sin(Math.PI*t),
          weight: 1.10,
          meta: bootMeta
        })
      );
      connectGridToGrid(shaft, ankleWrap, 3, 2, .92);

      const footShell=buildBootFootShell(
        w({ x:ankleX+sign*.004, y:ankleY+.125, z:footZ-.270 }),
        w({ x:ankleX+sign*.038, y:ankleY+.165, z:footZ+.555 }),
        14, 'boot', t => {
          const broad=Math.sin(Math.PI*Math.min(1,t*.94));
          const toe=smoothstep(.68,1,t);
          const instep=Math.exp(-Math.pow((t-.28)/.18,2));
          return {
            side: .092 + .066*broad - .026*toe,
            forward: .052 + .034*instep + .008*broad - .010*toe,
            offsetForward: -.012*toe,
            weight: 1.08,
            meta: bootMeta
          };
        }
      );
      strengthenRing(footShell[footShell.length-1], 1.65);
      capRing(footShell[footShell.length-1], 'boot', 1.22, 1.34, bootMeta);
      connectGridToGrid(ankleWrap, footShell, 1, 2, .88);

      const sole=buildSolePlate(side, bootAnkleX, bootAnkleY, bootFootZ);
      connectGridToGrid(footShell, sole, 3, 1, .80);
      buildHeelBlock(side, bootAnkleX, bootAnkleY, bootFootZ);
