      else if (spinBlend > 0) runTime += .062 * (.35 + .65 * spinBlend) * frameStep;
      const headingDelta = normalizeAngle(walkHeadingTarget - walkHeading);
      if (Math.abs(headingDelta) > .0005) walkHeading = normalizeAngle(walkHeading + headingDelta * Math.min(1, .14 * frameStep));
      if (jumpActive || jumpTime < 1) {
        jumpTime = Math.min(1, jumpTime + .020 * frameStep);
        if (jumpTime >= 1) jumpActive = false;
      }
      const currentState = `${runBlend.toFixed(4)}:${moonwalkBlend.toFixed(4)}:${spinBlend.toFixed(4)}:${crouchBlend.toFixed(4)}:${squatBlend.toFixed(4)}:${walkMoveBlend.toFixed(4)}:${jumpTime.toFixed(4)}`;
      if (runMotion || moonwalkMotion || spinMotion || crouchMotion || squatMotion || jumpActive || gaitBlend > 0 || spinBlend > 0 || crouchBlend > 0 || squatBlend > 0 || previousState !== currentState || upperBodyTracking.dirty) {
        buildHuman();
        upperBodyTracking.dirty = false;
      }
      ctx.clearRect(0,0,width,height);
      if(!isDragging){ rotationY+=velocityY; rotationX+=velocityX; velocityX*=.965; velocityY*=.985; }
      rotationX=Math.max(-Math.PI/2+.08,Math.min(Math.PI/2-.08,rotationX)); tick+=.01*frameStep;
      syncCameraViewButtons();
      const projected=points.map(projectPoint); lastProjected=projected; const showTrackedHead=trackedHeadShellActive(); ctx.save(); ctx.translate(width/2,height/2+scale*.06+height*cameraVerticalOffset);
      const aura=ctx.createRadialGradient(0,-scale*.5,scale*.2,0,0,scale*2.3); aura.addColorStop(0,displayTheme==='dark'?'rgba(226,229,230,.10)':'rgba(255,255,255,.42)'); aura.addColorStop(.55,displayTheme==='dark'?'rgba(226,229,230,.035)':'rgba(255,255,255,.12)'); aura.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,0,scale*2.35,0,Math.PI*2); ctx.fill();
      drawCoordinatePlane();
      const orderedFaces=faces.map(face=>{
        const pts=face.ids.map(id=>projected[id]);
        if(pts.some(p=>!p?.visible||isHiddenPart(p.part))) return null;
        return { ...face, pts, rz: pts.reduce((sum,p)=>sum+p.rz,0)/pts.length };
      }).filter(Boolean).sort((a,b)=>a.rz-b.rz);
      for(const face of orderedFaces){
        const depth=smoothstep(-1.8,1.3,face.rz);
        ctx.globalAlpha=face.alpha*(.55+.70*depth);
        ctx.fillStyle=hexToRgba(meshDisplayColor('boot'), 1);
        ctx.beginPath();
        ctx.moveTo(face.pts[0].sx, face.pts[0].sy);
        for(let i=1;i<face.pts.length;i++) ctx.lineTo(face.pts[i].sx, face.pts[i].sy);
        ctx.closePath();
        ctx.fill();
      }
      for(const link of links){
        const a=projected[link.a], b=projected[link.b];
        if(!a||!b||!a.visible||!b.visible||isHiddenPart(a.part)||isHiddenPart(b.part)) continue;
        if(showTrackedHead && (a.part === 'head' || b.part === 'head')) continue;
        const depth=smoothstep(-1.8,1.3,(a.rz+b.rz)/2);
        const pulse=.88+.12*Math.sin(tick*3+link.a*.13);
        const isShadeLink = a.part === 'cap' || b.part === 'cap';
        const isBootLink = isBootPart(a.part) || isBootPart(b.part);
        const linkAlpha=isShadeLink ? 1 : (isBootLink ? Math.min(.76,link.strength*(.34+.64*depth)*pulse) : Math.min(.48,link.strength*(.18+.62*depth)*pulse));
        ctx.globalAlpha=linkAlpha;
        ctx.strokeStyle=strokeInkForLink(a,b);
        ctx.lineWidth=Math.max(.35,scale/320)*(.5+link.strength*.55)*((a.perspective+b.perspective)/2)*(isShadeLink ? 1.35 : (isBootLink ? 1.18 : 1));
        ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
      }
      const ordered=projected.filter(p=>p.visible&&!isHiddenPart(p.part)).sort((a,b)=>a.rz-b.rz);
      for(const p of ordered){
        if(showTrackedHead && p.part === 'head') continue;
        const depth=smoothstep(-1.75,1.35,p.rz);
        const scan=.93+.07*Math.sin(tick*7+p.ry*14+p.jitter*8);
        const isBootPoint=isBootPart(p.part);
        const size=Math.max(.65,scale/138)*p.weight*p.perspective*(.82+.36*depth)*(p.part === 'cap' ? 1.28 : (isBootPoint ? 1.10 : 1));
        const pointAlpha=p.part === 'cap' ? 1 : (isBootPoint ? Math.max(.42,Math.min(.98,(.38+.74*depth)*scan)) : Math.max(.10,Math.min(.96,(.22+.78*depth)*scan)));
        ctx.globalAlpha=pointAlpha;
        ctx.fillStyle=partInk(p.part); ctx.beginPath(); ctx.arc(p.sx,p.sy,size,0,Math.PI*2); ctx.fill();
      }
      drawTrackedFace();
      ctx.globalAlpha=.16; ctx.strokeStyle=displayTheme==='dark'?hexToRgba(DARK_FIGURE_INK,.72):'rgba(23,21,17,.55)'; ctx.lineWidth=.9; ctx.beginPath(); ctx.ellipse(0,0,scale*1.36,scale*3.08,Math.sin(rotationY)*.08,0,Math.PI*2); ctx.stroke();
      ctx.restore(); requestAnimationFrame(draw);
    }
    function canvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left - width/2, y: e.clientY - rect.top - height/2 - scale*.06 - height*cameraVerticalOffset };
    }
    function pickBootAt(e) {
      const pointer = canvasPoint(e);
      let best = null;
      for (const p of lastProjected) {
        if (!p?.visible || !isBootPart(p.part) || !p.bootSide) continue;
        const d = Math.hypot(pointer.x - p.sx, pointer.y - p.sy);
        if (d < 52 && (!best || d < best.distance)) best = { side: p.bootSide, distance: d };
      }
      return best?.side || '';
    }
    function bootOffsetLength(side) {
      const o = bootState[side].offset;
      return Math.hypot(o.x, o.y, o.z);
    }
    function snapBootIfClose(side, e) {
      const anchor = projectPoint(bootAnchors[side]);
      const pointer = e ? canvasPoint(e) : null;
      const droppedOnSocket = pointer && anchor.visible && Math.hypot(pointer.x - anchor.sx, pointer.y - anchor.sy) < 92;
      if (bootOffsetLength(side) < .46 || droppedOnSocket) {
        bootState[side].offset = { x: 0, y: 0, z: 0 };
        bootState[side].attached = true;
      } else {
        bootState[side].attached = false;
      }
      buildHuman();
    }
    function pointerDown(e){
      const bootSide = pickBootAt(e);
      activeDrag = bootSide ? { type: 'boot', side: bootSide } : { type: 'camera' };
      isDragging = activeDrag.type === 'camera';
      if (activeDrag.type === 'boot') {
        bootState[bootSide].attached = false;
        buildHuman();
      }
      canvas.style.cursor='grabbing'; lastPointerX=e.clientX; lastPointerY=e.clientY; lastMoveTime=performance.now(); velocityX=0; velocityY=0; canvas.setPointerCapture(e.pointerId);
    }
    function pointerMove(e){
      if(!activeDrag) return;
      const now=performance.now(), dx=e.clientX-lastPointerX, dy=e.clientY-lastPointerY, dt=Math.max(16,now-lastMoveTime);
      if (activeDrag.type === 'boot') {
        const side = activeDrag.side;
        const move = screenVectorToWorld(dx, dy);
        const o = bootState[side].offset;
        o.x += move.x; o.y += move.y; o.z += move.z;
        bootState[side].attached = false;
        buildHuman();
      } else {
        const sensitivity=.0065;
        rotationY+=dx*sensitivity; rotationX+=dy*sensitivity; velocityY=dx*sensitivity*(16/dt); velocityX=dy*sensitivity*(16/dt);
      }
      lastPointerX=e.clientX; lastPointerY=e.clientY; lastMoveTime=now;
    }
    function pointerUp(e){
      if (activeDrag?.type === 'boot') snapBootIfClose(activeDrag.side, e);
      activeDrag=null; isDragging=false; canvas.style.cursor='grab'; try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
    }
    canvas.addEventListener('wheel', e=>{ e.preventDefault(); zoomScale=Math.max(.45,Math.min(2.4,zoomScale*(e.deltaY<0?1.08:1/1.08))); resize(); }, { passive:false });
    canvas.addEventListener('pointerdown',pointerDown); canvas.addEventListener('pointermove',pointerMove); canvas.addEventListener('pointerup',pointerUp); canvas.addEventListener('pointercancel',pointerUp); canvas.addEventListener('pointerleave',e=>{ if(isDragging) pointerUp(e); });
    window.addEventListener('keydown', e => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      const key = e.key.toLowerCase();
      if (['w','a','s','d'].includes(key) || ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        deactivatePostureMotions();
      }
      if (['w','a','s','d'].includes(key)) {
        stopAutoMovesForManual();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkKey(key, true);
      }
      else if (e.key === 'ArrowUp') {
        stopAutoMovesForManual();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkHeading(0);
      }
      else if (e.key === 'ArrowDown') {
        stopAutoMovesForManual();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkHeading(Math.PI);
      }
      else if (e.key === 'ArrowLeft') {
        stopAutoMovesForManual();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkHeading(walkHeadingTarget - Math.PI / 12);
      }
      else if (e.key === 'ArrowRight') {
        stopAutoMovesForManual();
        spinMotion = false;
        document.getElementById('spinToggle')?.classList.remove('active');
        setWalkHeading(walkHeadingTarget + Math.PI / 12);
      }
      else return;
      e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      const key = e.key.toLowerCase();
      if (!['w','a','s','d'].includes(key)) return;
      setWalkKey(key, false);
      e.preventDefault();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && (faceTracking.enabled || faceTracking.starting)) stopFaceTracking();
    });
    window.addEventListener('pagehide', () => stopFaceTracking());
    window.addEventListener('resize',resize);
    window.render_game_to_text = () => JSON.stringify({
      build: APP_BUILD_ID,
      coordinateSystem: 'Figure-local X is left/right, Y increases downward, Z is depth; walk X/Z are ground displacement.',
      theme: displayTheme,
      ui: { meshColorMenuExpanded },
      camera: { rotationX, rotationY, zoom: zoomScale, verticalOffset: cameraVerticalOffset },
      motion: {
        run: runMotion,
        jump: jumpActive,
        moonwalk: moonwalkMotion,
        spin: spinMotion,
        crouch: crouchMotion,
        squat: squatMotion,
        crouchBlend,
        squatBlend,
        autoMoves: autoMovesActive
      },
      faceTracking: {
        enabled: faceTracking.enabled,
        starting: faceTracking.starting,
        status: faceTracking.status,
        holdingLastFace: faceTracking.enabled && faceTracking.status === 'holding',
        hasFace: faceTracking.hasFace,
        landmarkCount: faceTracking.landmarks.length,
        meshConnectionCount: faceTracking.meshConnectionCount,
        neckBufferConnectionCount: faceTracking.neckBufferConnectionCount,
        neckBufferRows: TRACKED_FACE_NECK_BUFFER_ROWS,
        headShellActive: trackedHeadShellActive(),
        headShellConnectionCount: faceTracking.headShellConnectionCount,
        headShellRingCount: faceTracking.headShellRingCount,
        headShellVertexCount: faceTracking.headShellVertexCount,
        headShellDepth: faceTracking.headShellDepth,
        headShellSource: trackedHeadScanMesh()?.source || null,
        headShellLicense: trackedHeadScanMesh()?.license || null,
        outerContourVisible: SHOW_TRACKED_FACE_OUTER_CONTOUR,
        frontVisible: trackedFaceOverlayVisible(),
        surfaceVisible: trackedFaceSurfaceVisible(),
        baseHeadMeshHidden: trackedHeadShellActive(),
        headRollRadians: faceTracking.headRoll,
        headRollDegrees: faceTracking.headRoll * 180 / Math.PI,
        targetHeadRollDegrees: faceTracking.targetHeadRoll * 180 / Math.PI,
        chinDrop: TRACKED_FACE_CHIN_DROP,
        error: faceTracking.error
      },
      upperBodyTracking: {
        hasPose: upperBodyTracking.hasPose,
        poseLandmarkCount: upperBodyTracking.poseLandmarks.length,
        leftArmTracked: Boolean(upperBodyTracking.armTargets.left),
        rightArmTracked: Boolean(upperBodyTracking.armTargets.right),
        leftHandTracked: upperBodyTracking.handLandmarks.left.length >= 21,
        rightHandTracked: upperBodyTracking.handLandmarks.right.length >= 21,
        leftHandLandmarkCount: upperBodyTracking.handLandmarks.left.length,
        rightHandLandmarkCount: upperBodyTracking.handLandmarks.right.length,
        pipelineFrame: upperBodyTracking.frameSequence,
        sendFailures: { ...upperBodyTracking.sendFailures },
        pipelineError: upperBodyTracking.lastPipelineError
      },
      learningMode: {
        recording: learningMode.recording,
        playing: learningMode.playing,
        preparingPlayback: learningMode.preparingPlayback,
        status: learningMode.status,
        recordingFrameCount: learningMode.frames.length,
        savedSessionCount: learningMode.sessions.length,
        playbackSessionId: learningMode.playbackSessionId,
        playbackFrameIndex: learningMode.playbackFrameIndex,
        lowerBody: 'N/A'
      },
      boots: { leftAttached: bootState.left.attached, rightAttached: bootState.right.attached }
    });
    setDisplayTheme('bright');
    setupMeshControls();
    initializeLearningMode();
    resize();
    draw();
  </script>
